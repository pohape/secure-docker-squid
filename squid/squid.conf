http_port 3128

# --- Authentication: only users in the generated passwd file ---
auth_param basic program /usr/lib/squid/basic_ncsa_auth /etc/squid/passwd
auth_param basic realm Proxy
acl authenticated proxy_auth REQUIRED

# --- Restrict to ordinary web traffic only (80/443) ---
# Limits the blast radius if credentials ever leak: a stolen password
# cannot be used to tunnel to SMTP, databases, SSH, arbitrary ports, etc.
acl CONNECT method CONNECT
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
http_access deny CONNECT !SSL_ports
http_access deny !Safe_ports

http_access allow authenticated
http_access deny all

# --- No caching; do not leak client identity ---
cache deny all
access_log stdio:/var/log/squid/access.log
cache_log stdio:/var/log/squid/cache.log
forwarded_for off
via off
